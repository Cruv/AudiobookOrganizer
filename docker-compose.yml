services:
  audiobook-organizer:
    build: .
    # image: ghcr.io/username/audiobook-organizer:latest
    container_name: audiobook-organizer
    ports:
      - "8080:80"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - GOOGLE_BOOKS_API_KEY=
      - DATABASE_URL=sqlite:////app/data/audiobook_organizer.db
    volumes:
      - ./data:/app/data
      - /path/to/audiobooks:/audiobooks
      - /path/to/organized:/organized
    restart: unless-stopped
